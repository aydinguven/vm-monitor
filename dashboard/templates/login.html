<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — VM Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #121210;
            --bg-card: #1e1e1a;
            --bg-hover: #26261f;
            --text-primary: #e8e4d9;
            --text-secondary: #9a9686;
            --text-muted: #5e5b50;
            --accent: #e8912d;
            --accent-dim: rgba(232, 145, 45, 0.15);
            --danger: #d42b2b;
            --border-color: rgba(232, 145, 45, 0.1);
            --border-strong: rgba(232, 145, 45, 0.2);
            --font-mono: 'JetBrains Mono', 'Cascadia Code', monospace;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(232, 145, 45, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(232, 145, 45, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.04) 2px,
                    rgba(0, 0, 0, 0.04) 4px);
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-top: 2px solid var(--accent);
            border-radius: 4px;
            padding: 40px 36px;
            position: relative;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo svg {
            width: 40px;
            height: 40px;
            color: var(--accent);
            margin-bottom: 12px;
            filter: drop-shadow(0 0 8px rgba(232, 145, 45, 0.3));
        }

        .logo h1 {
            font-family: var(--font-mono);
            font-size: 1.5em;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: -0.02em;
            margin-bottom: 4px;
            text-shadow: 0 0 20px rgba(232, 145, 45, 0.2);
        }

        .logo p {
            font-family: var(--font-mono);
            font-size: 0.75em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-family: var(--font-mono);
            font-size: 0.7em;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.9em;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .checkbox-group label {
            font-family: var(--font-mono);
            font-size: 0.78em;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #121210;
            border: none;
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease;
        }

        .btn-login:hover {
            background: #d07e24;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert {
            padding: 10px 14px;
            border-radius: 3px;
            margin-bottom: 20px;
            font-size: 0.82em;
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background: rgba(212, 43, 43, 0.1);
            border: 1px solid rgba(212, 43, 43, 0.25);
            color: #e06060;
        }

        .alert-info {
            background: var(--accent-dim);
            border: 1px solid var(--border-strong);
            color: var(--accent);
        }

        .alert svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2" />
                <path d="M8 21h8M12 17v4" />
            </svg>
            <h1>VM Monitor</h1>
            <p>Authentication Required</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                {% if category == 'error' %}
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
                {% else %}
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="16" x2="12" y2="12" />
                <line x1="12" y1="8" x2="12.01" y2="8" />
                {% endif %}
            </svg>
            <span>{{ message }}</span>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" autofocus required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember me for 7 days</label>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>
</body>

</html>
